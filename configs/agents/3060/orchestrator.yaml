# orchestrator (3060 variant) — resource-aware dispatcher for specialist agents
#
# BASE MODEL: Qwen2.5-Coder-14B-Instruct — Apache-2.0
#   Unified base for all 7 agents: one model + 7 LoRA adapters on RTX 3060.
#
# Longer context (8192) for multi-turn planning with resource state.
# Packing disabled — chat format with variable-length conversations.

model:
  name_or_path: "Qwen/Qwen2.5-Coder-14B-Instruct"
  trust_remote_code: true

training:
  max_seq_length: 8192
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  num_train_epochs: 3

packing:
  enabled: false

lora:
  r: 64
  lora_alpha: 16
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
