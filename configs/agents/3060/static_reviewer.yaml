# static_reviewer (3060 variant) — code review, bug detection, quality feedback
#
# BASE MODEL: Qwen2.5-Coder-14B-Instruct — Apache-2.0
#   Unified base for all 7 agents: one model + 7 LoRA adapters on RTX 3060.

model:
  name_or_path: "Qwen/Qwen2.5-Coder-14B-Instruct"
  trust_remote_code: true

training:
  max_seq_length: 4096
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.5e-4
  num_train_epochs: 4

packing:
  enabled: false
