# performance_optimizer — Python code optimization for speed/memory/efficiency
#
# BASE MODEL: Qwen3-32B — Apache-2.0
#   Performance optimization requires deep reasoning about algorithmic complexity,
#   data structure tradeoffs, and runtime behavior. Qwen3-32B's thinking mode
#   provides the controllable reasoning depth needed to analyze bottlenecks
#   and propose correct optimizations.
#
#   Also benefits from Qwen3's training on competitive programming and
#   algorithm-heavy tasks where optimization is the core skill.
#
# 32B on A100 80GB with QLoRA: batch_size=1, grad_accum=16.

model:
  name_or_path: "Qwen/Qwen3-32B"
  trust_remote_code: true

training:
  max_seq_length: 4096
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  num_train_epochs: 3

packing:
  enabled: true
