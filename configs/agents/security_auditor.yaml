# security_auditor — vulnerability detection, CWE identification, secure fixes
#
# BASE MODEL: Qwen3-32B — Apache-2.0
#   Security auditing is reasoning-heavy: the model must trace data flows,
#   identify trust boundaries, and explain exploit scenarios with CWE refs.
#   Qwen3-32B's thinking mode gives controllable reasoning depth —
#   critical for thorough vulnerability analysis.
#
#   "Search-style planners benefit from controllable reasoning depth. Qwen3
#    explicitly supports enabling/disabling thinking." — Research analysis
#
# 32B on A100 80GB with QLoRA: batch_size=1, grad_accum=16.

model:
  name_or_path: "Qwen/Qwen3-32B"
  trust_remote_code: true

training:
  max_seq_length: 4096
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.5e-4
  num_train_epochs: 10
  save_steps: 25
  eval_steps: 25
  logging_steps: 5

packing:
  enabled: true
