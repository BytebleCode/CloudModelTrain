# static_reviewer — code review, bug detection, quality feedback
#
# BASE MODEL: Qwen3-32B — Apache-2.0
#   "Reviewer/critic: Qwen3-32B or DeepSeek-R1-distill variants. Qwen3 offers
#    native thinking mode switch and broad agent-training ecosystem evidence."
#   Used by SERA, SWE-Lego, DeepSWE as base for high-performing agent training.
#   Thinking mode enables deep reasoning about code quality.
#
# 32B on A100 80GB with QLoRA: batch_size=1, grad_accum=16 for effective batch 16.

model:
  name_or_path: "Qwen/Qwen3-32B"
  trust_remote_code: true

training:
  max_seq_length: 4096
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.5e-4
  num_train_epochs: 4

packing:
  enabled: false
