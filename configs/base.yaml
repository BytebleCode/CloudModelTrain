# Base training configuration — all agents inherit from this.
# Per-agent overrides live in configs/agents/<agent_name>.yaml
#
# MODEL SELECTION RATIONALE (from research analysis):
#   Each agent role uses a different base model optimized for its task.
#   The base.yaml default is Devstral Small (24B) — the strongest SWE-agent
#   base — but per-agent configs override this where needed.
#
#   code_writer / test_generator: Devstral Small (24B) — agent-first SWE model
#   static_reviewer / security_auditor / perf_optimizer: Qwen3-32B — reasoning + thinking mode
#   docs_generator: Qwen2.5-Coder-7B-Instruct — lightweight, cheap, high-volume
#
# All selected models are Apache-2.0 licensed.

model:
  name_or_path: "mistralai/Devstral-Small-2505"
  trust_remote_code: true

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 64
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_seq_length: 4096
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  fp16: false
  bf16: true
  tf32: true
  gradient_checkpointing: true
  optim: "paged_adamw_32bit"
  max_grad_norm: 0.3
  group_by_length: false
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  report_to: "tensorboard"

packing:
  enabled: false

flash_attention:
  enabled: false
  # Set true on RunPod A100 (auto-enabled by go.sh if flash-attn installed)

data:
  train_split: "train"
  eval_split: "eval"
  eval_size: 0.05
  seed: 42

output:
  base_dir: "outputs"

cost:
  gpu_hour_price: 1.14      # $/hr for RunPod A100 PCIe 80GB (spot pricing)
