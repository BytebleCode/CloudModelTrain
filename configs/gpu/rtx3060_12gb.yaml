# GPU Profile: NVIDIA RTX 3060 12GB
# Tight VRAM — all agents: batch_size=1, grad_accum=16.
# For local training/testing and inference with LoRA hot-swapping.

gpu:
  name: "RTX 3060 12GB"
  vram_gb: 12
  architecture: "Ampere"

cost:
  gpu_hour_price: 0.00    # local GPU — no rental cost

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  dataloader_num_workers: 2
